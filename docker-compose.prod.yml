services:
  backend:
    build:
      context: .
      dockerfile: ./apps/2048-express/Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./apps/2048-express/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: ./apps/2048-next/Dockerfile
      # NEXT_PUBLIC_ vars are baked into the JS bundle at build time — pass them here
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL}
    ports:
      - '3000:3000'
    env_file:
      - ./apps/2048-next/.env
    depends_on:
      - backend
    restart: unless-stopped
