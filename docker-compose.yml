services:
  backend:
    build:
      context: .
      dockerfile: ./apps/2048-express/Dockerfile.dev
    ports:
      - '8000:8000'
    env_file:
      - ./apps/2048-express/.env
    volumes:
      # Preserve container node_modules so host never overwrites them
      - backend_modules:/app/node_modules
      - backend_app_modules:/app/apps/2048-express/node_modules
    develop:
      watch:
        - action: sync
          path: ./apps/2048-express/src
          target: /app/apps/2048-express/src
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/shared-2048-logic/src
          target: /app/packages/shared-2048-logic/src
        - action: rebuild
          path: apps/2048-express/package.json
        - action: rebuild
          path: packages/shared-2048-logic/package.json

  frontend:
    build:
      context: .
      dockerfile: ./apps/2048-next/Dockerfile.dev
    ports:
      - '3000:3000'
    env_file:
      - ./apps/2048-next/.env
    volumes:
      - frontend_modules:/app/node_modules
      - frontend_app_modules:/app/apps/2048-next/node_modules
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./apps/2048-next/app
          target: /app/apps/2048-next/app
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/shared-2048-logic/src
          target: /app/packages/shared-2048-logic/src
        - action: rebuild
          path: apps/2048-next/package.json
        - action: rebuild
          path: packages/shared-2048-logic/package.json

volumes:
  backend_modules:
  backend_app_modules:
  frontend_modules:
  frontend_app_modules:
